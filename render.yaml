services:
  - type: web
    name: elevage-pro
    env: docker
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: elevage-pro-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: elevage-pro-db
    plan: starter
